<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI 穿搭生成 - 测试页</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f6f6f8; color: #1c1c28; }
  .wrap { max-width: 420px; margin: 0 auto; padding: 20px 16px 40px; }
  h1 { font-size: 20px; margin-bottom: 4px; }
  .sub { color: #8a8a99; font-size: 13px; margin-bottom: 12px; }
  #userbar { font-size: 12px; color: #6c5ce7; background: #edeaff; border-radius: 8px; padding: 6px 10px; margin-bottom: 14px; }
  h2 { font-size: 15px; margin: 18px 0 10px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .slot { background: #fff; border: 1.5px dashed #d5d5e0; border-radius: 12px; height: 120px;
          display: flex; flex-direction: column; align-items: center; justify-content: center;
          cursor: pointer; overflow: hidden; position: relative; }
  .slot img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
  .slot span { font-size: 13px; color: #8a8a99; z-index: 1; background: rgba(255,255,255,.8); padding: 2px 8px; border-radius: 8px; }
  .slot .fav { position: absolute; top: 6px; left: 6px; z-index: 2; background: #6c5ce7; color: #fff;
               border: 0; border-radius: 50%; width: 26px; height: 26px; cursor: pointer; }
  .person { height: 140px; }
  .styles { display: flex; gap: 8px; }
  .style-btn { flex: 1; padding: 10px 0; border-radius: 10px; border: 1.5px solid #d5d5e0; background: #fff; font-size: 14px; cursor: pointer; }
  .style-btn.active { border-color: #6c5ce7; background: #edeaff; color: #6c5ce7; font-weight: 600; }
  .gen { width: 100%; margin-top: 22px; padding: 14px 0; border: 0; border-radius: 12px;
         background: linear-gradient(90deg,#6c5ce7,#a55eea); color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; }
  .gen:disabled { opacity: .5; }
  #status { margin-top: 12px; text-align: center; font-size: 14px; color: #6c5ce7; min-height: 20px; }
  #result { margin-top: 16px; }
  #result img { width: 100%; border-radius: 14px; box-shadow: 0 6px 24px rgba(0,0,0,.12); }
  .sec-btn { width: 100%; margin-top: 10px; padding: 12px 0; border-radius: 12px; border: 1.5px solid #6c5ce7;
             background: #edeaff; color: #6c5ce7; font-size: 15px; font-weight: 600; cursor: pointer; }
  .thumbs { display: flex; flex-wrap: wrap; gap: 8px; }
  .thumb { position: relative; width: 92px; height: 92px; border-radius: 10px; overflow: hidden; background: #fff; }
  .thumb img { width: 100%; height: 100%; object-fit: cover; }
  .thumb .del { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,.6); color: #fff; border: 0;
                border-radius: 50%; width: 22px; height: 22px; cursor: pointer; font-size: 12px; }
  .thumb .cat { position: absolute; left: 4px; bottom: 4px; background: rgba(0,0,0,.55); color: #fff;
                font-size: 10px; padding: 1px 6px; border-radius: 8px; }
  .muted { color: #8a8a99; font-size: 13px; }
  input[type=file] { display: none; }
  .wrap { padding-bottom: 86px; }
  .tabs { position: fixed; left: 0; right: 0; bottom: 0; z-index: 10; max-width: 420px; margin: 0 auto;
          display: flex; background: #fff; border-top: 1px solid #ececf2; padding: 6px 8px calc(8px + env(safe-area-inset-bottom)); }
  .tab-btn { flex: 1; padding: 8px 0; border: 0; border-radius: 10px; background: transparent; color: #8a8a99; font-size: 13px; cursor: pointer; }
  .tab-btn .ico { display: block; font-size: 20px; line-height: 1.2; }
  .tab-btn.active { color: #6c5ce7; font-weight: 600; }
  .tab-btn.active .muted { color: #6c5ce7; }
  .outfit-card { background: #fff; border-radius: 12px; padding: 10px; margin-bottom: 12px; }
  .outfit-card .main { position: relative; cursor: pointer; }
  .outfit-card .main > img { width: 100%; border-radius: 10px; display: block; }
  .outfit-card .del { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,.6); color: #fff; border: 0;
                      border-radius: 50%; width: 24px; height: 24px; cursor: pointer; font-size: 12px; }
  .outfit-items { display: none; margin-top: 10px; }
  .outfit-card.open .outfit-items { display: block; }
  .outfit-items .tip { font-size: 12px; color: #8a8a99; margin-bottom: 6px; }
  .outfit-items .row { display: flex; gap: 8px; overflow-x: auto; }
  .outfit-items .thumb { flex: 0 0 auto; width: 72px; height: 72px; border: 1px solid #ececf2; cursor: pointer; }
  .outfit-items .thumb.sel { outline: 3px solid #6c5ce7; outline-offset: -3px; }
  .outfit-items .thumb.sel::after { content: "✓"; position: absolute; top: 2px; right: 4px; color: #6c5ce7; font-weight: 700; }
  .use-parts { margin-top: 10px; width: 100%; padding: 10px 0; border: 0; border-radius: 10px; background: #6c5ce7; color: #fff; font-size: 14px; cursor: pointer; }
  .use-parts:disabled { opacity: .4; }
  .me-card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .me-card h3 { font-size: 14px; margin-bottom: 10px; }
  .me-row { display: flex; justify-content: space-between; font-size: 14px; padding: 8px 0; border-bottom: 1px solid #f2f2f6; }
  .me-row:last-child { border-bottom: 0; }
  .me-row .v { color: #8a8a99; }
  .badge { background: #edeaff; color: #6c5ce7; font-size: 12px; padding: 2px 10px; border-radius: 10px; }
  .me-btn { width: 100%; margin-top: 10px; padding: 12px 0; border-radius: 10px; border: 0; font-size: 15px; font-weight: 600; cursor: pointer; }
  .me-btn.primary { background: linear-gradient(90deg,#f7b733,#fc4a1a); color: #fff; }
  .me-btn.plain { background: #fff; border: 1.5px solid #d5d5e0; color: #1c1c28; font-weight: 400; }
  .tab { display: none; }
  .tab.active { display: block; }
</style>
</head>
<body>
<div class="wrap">
  <h1>AI 穿搭生成（测试页）</h1>
  <div class="sub">与小程序相同流程，调用同一后端 /api/*</div>
  <div id="userbar">登录中…</div>

  <div class="tab active" id="gen">
  <h2>模特照片（可选）</h2>
  <div class="slot person" data-key="person"><span>点击上传模特全身照</span></div>

  <h2>穿搭单品（至少一件，☆ 可收藏进衣柜）</h2>
  <div class="grid">
    <div class="slot" data-key="top"><span>上衣</span></div>
    <div class="slot" data-key="pants"><span>裤子</span></div>
    <div class="slot" data-key="shoes"><span>鞋子</span></div>
    <div class="slot" data-key="hat"><span>帽子</span></div>
  </div>

  <h2>背景风格</h2>
  <div class="styles">
    <button class="style-btn active" data-style="street">街拍</button>
    <button class="style-btn" data-style="studio">影棚</button>
    <button class="style-btn" data-style="outdoor">户外</button>
  </div>

  <button class="gen" id="genBtn">生成穿搭</button>
  <div id="status"></div>
  <div id="result"></div>
  <button class="sec-btn" id="collectBtn" style="display:none">☆ 收藏套装</button>
  </div>

  <div class="tab" id="wardrobeTab">
    <h2>我的衣柜</h2>
    <div class="muted" style="margin-bottom:10px">点击单品可直接用于生成（自动切回生成页）</div>
    <div class="thumbs" id="wardrobe"><span class="muted">（空）</span></div>
  </div>

  <div class="tab" id="outfitsTab">
    <h2>套装收藏</h2>
    <div class="muted" style="margin-bottom:10px">点击套装可展开查看生成时用的单品配件</div>
    <div id="outfits"><span class="muted">（空）</span></div>
  </div>

  <div class="tab" id="meTab">
    <h2>我的</h2>
    <div class="me-card">
      <h3>账号信息</h3>
      <div class="me-row"><span>账号</span><span class="v" id="meUser">-</span></div>
      <div class="me-row"><span>登录方式</span><span class="v" id="meMode">-</span></div>
      <div class="me-row"><span>注册时间</span><span class="v" id="meDate">-</span></div>
      <div class="me-row"><span>衣柜单品</span><span class="v" id="meW">-</span></div>
      <div class="me-row"><span>收藏套装</span><span class="v" id="meO">-</span></div>
    </div>
    <div class="me-card">
      <h3>会员</h3>
      <div class="me-row"><span>当前等级</span><span class="badge" id="meLevel">免费版</span></div>
      <button class="me-btn primary" id="vipBtn">👑 开通会员 / 充值</button>
    </div>
    <button class="me-btn plain" id="logoutBtn">退出登录（切换新账号）</button>
  </div>

  <input type="file" id="file" accept="image/*">

  <div class="tabs">
    <button class="tab-btn active" data-tab="gen"><span class="ico">✨</span>生成</button>
    <button class="tab-btn" data-tab="wardrobeTab"><span class="ico">👕</span>衣柜 <span class="muted" id="wcount"></span></button>
    <button class="tab-btn" data-tab="outfitsTab"><span class="ico">⭐</span>收藏 <span class="muted" id="ocount"></span></button>
    <button class="tab-btn" data-tab="meTab"><span class="ico">👤</span>我的</button>
  </div>
</div>
<script>
const images = {};
let currentKey = null, bg = "street", token = "", lastImage = null, lastItems = [];
const $ = (id) => document.getElementById(id);
const fileInput = $("file");

function showTab(id) {
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.id === id));
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.tab === id));
}
document.querySelectorAll(".tab-btn").forEach(b => b.addEventListener("click", () => showTab(b.dataset.tab)));

async function api(method, path, body) {
  const resp = await fetch(path, {
    method,
    headers: { "Content-Type": "application/json", ...(token ? { Authorization: "Bearer " + token } : {}) },
    body: body ? JSON.stringify(body) : undefined
  });
  const data = await resp.json();
  if (!resp.ok) throw new Error(data.details || data.error || ("HTTP " + resp.status));
  return data;
}

async function login() {
  let code = localStorage.getItem("dev_code");
  if (!code) { code = "web_" + Math.random().toString(36).slice(2, 10); localStorage.setItem("dev_code", code); }
  const data = await api("POST", "/api/login", { code });
  token = data.token;
  $("userbar").textContent = `已登录 · 账号 #${data.userId}${data.devMode ? "（开发模式）" : ""}`;
  refreshWardrobe(); refreshOutfits(); refreshMe();
}

async function refreshWardrobe() {
  const { items } = await api("GET", "/api/wardrobe");
  $("wcount").textContent = items.length ? `（${items.length} 件）` : "";
  $("wardrobe").innerHTML = items.length ? "" : '<span class="muted">（空）</span>';
  const labels = { top: "上衣", pants: "裤子", shoes: "鞋子", hat: "帽子" };
  for (const it of items) {
    const d = document.createElement("div");
    d.className = "thumb";
    d.innerHTML = `<img src="${it.imageUrl}" title="点击用于生成"><button class="del">×</button><span class="cat">${labels[it.category]}</span>`;
    d.querySelector("img").onclick = () => useWardrobeItem(it);
    d.querySelector(".del").onclick = async () => { await api("DELETE", "/api/wardrobe/" + it.id); refreshWardrobe(); };
    $("wardrobe").appendChild(d);
  }
}

function useWardrobeItem(it) {
  images[it.category] = { wardrobeId: it.id, imageUrl: it.imageUrl };
  const slot = document.querySelector(`.slot[data-key="${it.category}"]`);
  slot.querySelector("img")?.remove();
  const img = document.createElement("img");
  img.src = it.imageUrl;
  slot.prepend(img);
  showTab("gen");
  window.scrollTo({ top: 0, behavior: "smooth" });
}

const CAT_LABELS = { top: "上衣", pants: "裤子", shoes: "鞋子", hat: "帽子" };

async function urlToB64(url) {
  const blob = await (await fetch(url)).blob();
  return new Promise((resolve) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result.split(",")[1]);
    r.readAsDataURL(blob);
  });
}

async function refreshMe() {
  const me = await api("GET", "/api/me");
  $("meUser").textContent = "#" + me.userId + (me.nickname ? " · " + me.nickname : "");
  $("meMode").textContent = me.devMode ? "开发模式" : "微信登录";
  $("meDate").textContent = me.createdAt;
  $("meW").textContent = me.wardrobeCount + " 件";
  $("meO").textContent = me.outfitCount + " 套";
  $("meLevel").textContent = me.memberLevel === "free" ? "免费版" : me.memberLevel;
}
$("vipBtn").onclick = () => alert("会员/充值功能开发中，敬请期待～");
$("logoutBtn").onclick = () => {
  if (!confirm("退出后将以新账号登录，确定？")) return;
  localStorage.removeItem("dev_code");
  location.reload();
};
async function refreshOutfits() {
  const { items } = await api("GET", "/api/outfits");
  $("ocount").textContent = items.length ? `（${items.length}）` : "";
  $("outfits").innerHTML = items.length ? "" : '<span class="muted">（空）</span>';
  for (const it of items) {
    const card = document.createElement("div");
    card.className = "outfit-card";
    const parts = (it.items || []).map(p =>
      `<div class="thumb" data-cat="${p.category}" data-url="${p.imageUrl}"><img src="${p.imageUrl}"><span class="cat">${CAT_LABELS[p.category] || p.category}</span></div>`).join("");
    card.innerHTML = `
      <div class="main"><img src="${it.imageUrl}"><button class="del">×</button></div>
      <div class="outfit-items">
        <div class="tip">生成时的单品配件（点击配件预选，可多选）</div>
        <div class="row">${parts || '<span class="muted">（无配件记录）</span>'}</div>
        ${parts ? '<button class="use-parts" disabled>把选中配件填入生成页</button>' : ""}
      </div>`;
    card.querySelector(".main img").onclick = () => card.classList.toggle("open");
    card.querySelector(".del").onclick = async (e) => { e.stopPropagation(); await api("DELETE", "/api/outfits/" + it.id); refreshOutfits(); };
    const useBtn = card.querySelector(".use-parts");
    card.querySelectorAll(".outfit-items .thumb").forEach(t => {
      t.onclick = () => {
        t.classList.toggle("sel");
        const n = card.querySelectorAll(".thumb.sel").length;
        useBtn.disabled = n === 0;
        useBtn.textContent = n ? `把选中的 ${n} 件配件填入生成页` : "把选中配件填入生成页";
      };
    });
    if (useBtn) useBtn.onclick = async () => {
      for (const t of card.querySelectorAll(".thumb.sel")) {
        const { cat, url } = t.dataset;
        images[cat] = { data: await urlToB64(url), mimeType: "image/png" };
        const slot = document.querySelector(`.slot[data-key="${cat}"]`);
        slot.querySelector("img")?.remove();
        const img = document.createElement("img");
        img.src = url;
        slot.prepend(img);
      }
      showTab("gen");
      window.scrollTo({ top: 0, behavior: "smooth" });
    };
    $("outfits").appendChild(card);
  }
}

document.querySelectorAll(".slot").forEach(el => {
  el.addEventListener("click", (e) => {
    if (e.target.classList.contains("fav") || e.target.classList.contains("del")) return;
    currentKey = el.dataset.key; fileInput.click();
  });
});
fileInput.addEventListener("change", () => {
  const f = fileInput.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = () => {
    const dataUrl = reader.result;
    images[currentKey] = { data: dataUrl.split(",")[1], mimeType: f.type || "image/jpeg" };
    const slot = document.querySelector(`.slot[data-key="${currentKey}"]`);
    slot.querySelector("img")?.remove();
    slot.querySelector(".fav")?.remove();
    const img = document.createElement("img");
    img.src = dataUrl;
    slot.prepend(img);
    if (currentKey !== "person") {
      const key = currentKey;
      const fav = document.createElement("button");
      fav.className = "fav"; fav.textContent = "☆"; fav.title = "收藏进衣柜";
      fav.onclick = async (e) => {
        e.stopPropagation();
        try { await api("POST", "/api/wardrobe", { category: key, image: images[key] }); fav.textContent = "★"; refreshWardrobe(); }
        catch (err) { alert("收藏失败: " + err.message); }
      };
      slot.appendChild(fav);
    }
  };
  reader.readAsDataURL(f);
  fileInput.value = "";
});
document.querySelectorAll(".style-btn").forEach(b => {
  b.addEventListener("click", () => {
    document.querySelectorAll(".style-btn").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    bg = b.dataset.style;
  });
});
$("genBtn").addEventListener("click", async () => {
  const items = {};
  for (const k of ["top","pants","shoes","hat"]) if (images[k]) items[k] = images[k];
  if (Object.keys(items).length === 0) { alert("请至少上传一件单品"); return; }
  const btn = $("genBtn"), status = $("status");
  btn.disabled = true;
  $("result").innerHTML = ""; $("collectBtn").style.display = "none";
  const t0 = Date.now();
  const timer = setInterval(() => { status.textContent = `生成中… ${Math.round((Date.now()-t0)/1000)}s`; }, 1000);
  try {
    const data = await api("POST", "/api/tryon", { items, personImage: images.person || undefined, backgroundStyle: bg });
    clearInterval(timer);
    status.textContent = `生成成功（${Math.round((Date.now()-t0)/1000)}s）`;
    lastImage = data.image;
    lastItems = ["top","pants","shoes","hat"].filter(k => images[k]).map(k =>
      images[k].wardrobeId ? { category: k, wardrobeId: images[k].wardrobeId } : { category: k, data: images[k].data, mimeType: images[k].mimeType });
    $("result").innerHTML = `<img src="${data.image}">`;
    $("collectBtn").style.display = "block";
    $("collectBtn").textContent = "☆ 收藏套装";
    $("collectBtn").disabled = false;
  } catch (e) {
    clearInterval(timer);
    status.textContent = "失败：" + e.message;
  } finally { btn.disabled = false; }
});
$("collectBtn").addEventListener("click", async () => {
  if (!lastImage) return;
  $("collectBtn").disabled = true;
  try {
    await api("POST", "/api/outfits", { image: { data: lastImage }, backgroundStyle: bg, items: lastItems });
    $("collectBtn").textContent = "★ 已收藏";
    refreshOutfits();
  } catch (e) {
    alert("收藏失败: " + e.message);
    $("collectBtn").disabled = false;
  }
});
login().catch(e => { $("userbar").textContent = "登录失败: " + e.message; });
</script>
</body>
</html>
